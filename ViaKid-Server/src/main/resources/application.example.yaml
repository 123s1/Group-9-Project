ktor:
  deployment:
    port: 8900
    host: 0.0.0.0
  application:
    modules:
      - com.viakid.server.ApplicationKt.module

database:
  driver: "com.microsoft.sqlserver.jdbc.SQLServerDriver"
  url: "jdbc:sqlserver://localhost:1433;databaseName=ViaKidDB;encrypt=true;trustServerCertificate=true"
  user: "sa"
  password: "YOUR_DB_PASSWORD_HERE"
  poolSize: 10

jwt:
  secret: "CHANGE_THIS_TO_A_RANDOM_32_CHAR_STRING"
  issuer: "viakid-server"
  audience: "viakid-app"
  realm: "viakid-server"
  accessTokenValidity: 3600000
  refreshTokenValidity: 604800000

file:
  uploadDir: "uploads"

cors:
  allowedHosts: ""
